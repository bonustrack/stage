# Deploy with: fly launch --copy-config --no-deploy   (run once to create the app)
#              fly secrets set TELEGRAM_BOT_TOKEN=... ANTHROPIC_API_KEY=... TELEGRAM_CHAT_ID=...
#              fly deploy
#
# Run from the repo root (Dockerfile assumes the workspace layout).

app = "metro-bot"
primary_region = "iad"

[build]
  dockerfile = "apps/bot/Dockerfile"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

# Long-poller — no inbound HTTP needed, no public service.
[deploy]
  strategy = "immediate"
