<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Metro Preview</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d1117; color: #e6edf3; padding: 24px;
  }
  .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 16px;
    padding: 32px; max-width: 360px; width: 100%; text-align: center;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.sub { font-size: 13px; color: #8b949e; margin: 0 0 24px; }
  .branch { color: #1f9c8b; font-weight: 600; }
  a.btn {
    display: block; background: #1f9c8b; color: #fff; text-decoration: none;
    font-weight: 600; font-size: 16px; padding: 14px 20px; border-radius: 12px;
    margin-bottom: 20px;
  }
  a.btn:active { opacity: .85; }
  #qr { background: #fff; padding: 12px; border-radius: 12px; display: inline-block; min-height: 200px; }
  #qr img { display: block; }
  code {
    display: block; word-break: break-all; font-size: 11px; color: #8b949e;
    margin-top: 18px; line-height: 1.5;
  }
  .err { color: #f85149; font-size: 14px; }
</style>
</head>
<body>
  <div class="card">
    <h1>Metro Preview</h1>
    <p class="sub" id="sub">Open the latest preview in the Metro dev-client</p>
    <div id="content">
      <p class="err">Loading…</p>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
  (function () {
    // Permanent, branch-pinned preview launcher (#434). Unlike
    // preview-launcher.html?u=<.../group/<groupId>> (pinned to ONE immutable
    // commit), this resolves the LATEST update for a branch's EAS channel at
    // click time. We don't query any API: the EAS update server (u.expo.dev)
    // serves the latest compatible update for a channel when the manifest URL
    // carries ?channel-name=<channel>, so the dev-client fetches the freshest
    // bundle every time. No auth, no token, no rate limit, no telemetry.
    var PROJECT_ID = '1707f2db-c2b8-4c91-9341-27b1d57d355f';
    var SCHEME = 'metro'; // dev variant scheme (app.config.js). Prod = 'stage'.

    var content = document.getElementById('content');
    var sub = document.getElementById('sub');
    var params = new URLSearchParams(location.search);
    var branch = params.get('branch') || 'main';

    // Mirror the channel sanitiser in .github/workflows/pr-preview.yml:
    // git refs allow '/', EAS channels only [a-zA-Z0-9._-]. '/' -> '-', drop
    // anything else so ?branch=feat/foo maps to the same channel CI published.
    var channel = branch.replace(/\//g, '-').replace(/[^a-zA-Z0-9._-]/g, '');

    if (!channel) {
      content.innerHTML = '<p class="err">Invalid ?branch= value.</p>';
      return;
    }

    sub.innerHTML = 'Latest preview for branch <span class="branch">' + channel.replace(/</g, '&lt;') + '</span>';

    // The dev-client fetches this manifest URL and adds its own platform /
    // runtime-version headers; ?channel-name resolves "latest on channel".
    var manifest = 'https://u.expo.dev/' + PROJECT_ID + '?channel-name=' + encodeURIComponent(channel);
    // dev-client deep link (see docs.expo.dev/eas-update/expo-dev-client)
    var deeplink = SCHEME + '://expo-development-client/?url=' + encodeURIComponent(manifest);

    content.innerHTML =
      '<a class="btn" href="' + deeplink + '">Open in Metro</a>' +
      '<div id="qr"></div>' +
      '<code>' + deeplink.replace(/&/g, '&amp;').replace(/</g, '&lt;') + '</code>';

    try {
      new QRCode(document.getElementById('qr'), {
        text: deeplink, width: 200, height: 200,
        colorDark: '#000000', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    } catch (e) {
      document.getElementById('qr').innerHTML =
        '<img alt="QR" width="200" height="200" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' +
        encodeURIComponent(deeplink) + '" />';
    }

    // Auto-launch the dev-client on touch devices (the tap button + QR remain
    // as fallback). A bare assignment is the most reliable cross-browser way to
    // fire a custom-scheme deep link without a user gesture being required.
    if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
      setTimeout(function () { location.href = deeplink; }, 400);
    }
  })();
</script>
</body>
</html>
