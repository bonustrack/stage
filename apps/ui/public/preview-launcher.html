<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Metro PR Preview</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d1117; color: #e6edf3; padding: 24px;
  }
  .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 16px;
    padding: 32px; max-width: 360px; width: 100%; text-align: center;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.sub { font-size: 13px; color: #8b949e; margin: 0 0 24px; }
  a.btn {
    display: block; background: #1f9c8b; color: #fff; text-decoration: none;
    font-weight: 600; font-size: 16px; padding: 14px 20px; border-radius: 12px;
    margin-bottom: 20px;
  }
  a.btn:active { opacity: .85; }
  #qr { background: #fff; padding: 12px; border-radius: 12px; display: inline-block; min-height: 200px; }
  #qr img { display: block; }
  code {
    display: block; word-break: break-all; font-size: 11px; color: #8b949e;
    margin-top: 18px; line-height: 1.5;
  }
  .err { color: #f85149; font-size: 14px; }
</style>
</head>
<body>
  <div class="card">
    <h1>Metro PR Preview</h1>
    <p class="sub">Open this PR's JS bundle in the Metro dev-client</p>
    <div id="content">
      <p class="err">Loading…</p>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
  (function () {
    var content = document.getElementById('content');
    var params = new URLSearchParams(location.search);
    var manifest = params.get('u');

    if (!manifest) {
      content.innerHTML = '<p class="err">Missing ?u= update URL parameter.</p>';
      return;
    }

    // dev-client deep link (see docs.expo.dev/eas-update/expo-dev-client)
    var SCHEME = 'metro';
    var deeplink = SCHEME + '://expo-development-client/?url=' + encodeURIComponent(manifest);

    content.innerHTML =
      '<a class="btn" href="' + deeplink + '">Open in Metro</a>' +
      '<div id="qr"></div>' +
      '<code>' + deeplink.replace(/&/g, '&amp;').replace(/</g, '&lt;') + '</code>';

    try {
      new QRCode(document.getElementById('qr'), {
        text: deeplink, width: 200, height: 200,
        colorDark: '#000000', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    } catch (e) {
      document.getElementById('qr').innerHTML =
        '<img alt="QR" width="200" height="200" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' +
        encodeURIComponent(deeplink) + '" />';
    }
  })();
</script>
</body>
</html>
