<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1115" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Stage</title>
    <script>
      /* Pre-paint theme resolution — read the persisted preference + OS hint so
         the page doesn't flash the wrong palette before main.ts kicks in. */
      (() => {
        const stored = (() => { try { return localStorage.getItem('app.theme'); } catch { return null; } })();
        const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = stored === 'dark' || ((stored === 'system' || !stored) && sysDark);
        document.documentElement.classList.toggle('dark', isDark);
      })();
    </script>
    <style>@keyframes metroBoot { to { transform: rotate(360deg); } }</style>
  </head>
  <body class="font-sans antialiased bg-metro-bg-light dark:bg-metro-bg-dark text-metro-fg-light dark:text-metro-fg-dark">
    <div id="app">
      <!-- Boot spinner shown during the JS bundle load (before Vue mounts +
           Tailwind CSS applies). Inline styles only; Vue replaces #app on mount. -->
      <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;">
        <svg width="32" height="32" viewBox="0 0 24 24" style="animation:metroBoot .5s linear infinite;transform-origin:center;color:#9b9b9b">
          <defs><linearGradient id="bootGrad" x1="28.154%" y1="63.74%" x2="74.629%" y2="17.783%">
            <stop stop-color="currentColor" offset="0%"></stop>
            <stop stop-color="currentColor" stop-opacity="0" offset="100%"></stop>
          </linearGradient></defs>
          <g transform="translate(2)" fill="none" fill-rule="evenodd">
            <circle stroke="url(#bootGrad)" stroke-width="4" cx="10" cy="12" r="10"></circle>
            <path d="M10 2C4.477 2 0 6.477 0 12" stroke="currentColor" stroke-width="4"></path>
            <rect x="8" width="4" height="4" rx="8" fill="currentColor"></rect>
          </g>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
