# Netlify build config for the Stage web app (apps/ui), deployed to the
# stage-livenet site (stage.box). The build runs from the repo root so Bun
# workspace dependencies resolve; publish points at the app's Vite output.

# base must be the repo root: the site's UI config set base to "apps/ui", which
# made the build run from there, so `--filter ./apps/ui` resolved to apps/ui/apps/ui
# ("No packages matched the filter") and publish doubled to apps/ui/apps/ui/dist.
# Setting base here overrides the UI so Bun workspace resolution and the publish
# path both work from the monorepo root.
[build]
  base = "/"
  command = "bun install && bun run --filter ./apps/ui build"
  publish = "apps/ui/dist"

# Pin the toolchain to the repo's packageManager / engines so CI matches local.
[build.environment]
  BUN_VERSION = "1.3.9"
  NODE_VERSION = "22"

# Cross-origin isolation: the app uses @xmtp/browser-sdk, which needs
# SharedArrayBuffer. COEP credentialless (not require-corp) keeps cross-origin
# avatars / IPFS images loading without per-resource CORP headers.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "credentialless"

# Apple App Site Association and Android assetlinks must be served as JSON
# (AASA has no file extension, so the content type is not inferred).
[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"

# The app uses hash routing (createWebHashHistory), so deep links live under
# "#/...". This SPA fallback is harmless and covers any non-hash deep link.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
