[build]
  # Build the apps/ui Vue site from the monorepo root.
  # NOTE: the --cwd flag must follow the `run` subcommand
  # (`bun run --cwd <dir> <script>`). Newer bun (>=1.3.x) no longer
  # accepts `bun --cwd <dir> run <script>`: it ignores the flag, prints
  # `bun run` help, builds nothing, and the deploy fails. This broke the
  # site when Netlify rolled its default bun version forward (2026-05-29).
  command = "bun install --frozen-lockfile && bun run --cwd apps/ui build"
  publish = "apps/ui/dist"

[build.environment]
  # Pin bun so a future Netlify default bump can't silently change CLI
  # semantics again.
  BUN_VERSION = "1.3.13"
  # Pin Node to 22 to match the repo's `engines.node: ">=22"`. Netlify's
  # default build image ships an older Node (18/20); `vite@6`, `vue-tsc`,
  # and several workspace deps assume Node >=22, so the default image can
  # fail the clean build even though it passes locally on Node 22.
  NODE_VERSION = "22"
  # Netlify enhanced secret scanning flags the `AIza...` keys inside the
  # committed Firebase config files (apps/app/google-services*.json) and
  # fails the deploy with a build-stage non-zero exit. Those are public
  # Firebase *client* config values (Web API keys are restricted by
  # Firebase app/SHA + API-key referrer rules, not bearer secrets) and are
  # intentionally committed for the React Native app — they are not part of
  # the apps/ui site that is actually published here. Omit them from the
  # scan so a legitimate, non-secret value can't break every deploy
  # (this had been failing builds on ALL branches, including main).
  SECRETS_SCAN_OMIT_PATHS = "apps/app/google-services.json,apps/app/google-services.prod.json"
