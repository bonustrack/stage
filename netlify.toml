[build]
  base = "."
  publish = "apps/ui/dist"
  command = "bun install --frozen-lockfile && bun --cwd apps/ui run build"

[build.environment]
  BUN_VERSION = "1.3.13"

# Universal/App-Link association files must be served verbatim (as the static
# JSON in apps/ui/public/.well-known), never rewritten to the SPA shell. These
# explicit rules come before the catch-all so the well-known path is never
# swallowed by it. force = false → only applied when the static file is absent,
# so the real files still take priority; this is purely a belt-and-suspenders.
[[redirects]]
  from = "/.well-known/apple-app-site-association"
  to = "/.well-known/apple-app-site-association"
  status = 200
  force = false

[[redirects]]
  from = "/.well-known/assetlinks.json"
  to = "/.well-known/assetlinks.json"
  status = 200
  force = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
