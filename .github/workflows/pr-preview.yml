name: App preview

# Per-branch JS-bundle preview for the Metro dev-client (#236, #256).
#
# What it does: on EVERY push to ANY branch it publishes the app's JS bundle as
# an EAS Update on a per-branch channel and surfaces a clickable dev-client deep
# link. Less taps it on a device that has the dev-client APK; the installed app
# swaps its JS for that branch's bundle — no new APK per push.
#
# TRIGGER (changed): runs on `push` to any branch (branches: ['**']), not just
# PRs. Every commit to every branch auto-publishes a preview — no /preview
# comment, no PR required. Branch maps 1:1 to its own EAS channel so each branch
# gets an independent preview + deep link.
#
# HOW THE DEEP LINK IS SURFACED (no PR context on a push):
#   • ALWAYS: written to the GitHub Actions job SUMMARY ($GITHUB_STEP_SUMMARY)
#     with the launcher URL, raw deep link and QR — open the run to grab it.
#   • WHEN A PR EXISTS for the pushed branch: also publishes the clickable
#     "Preview" commit status on the head SHA (target_url -> launcher), so the
#     existing PR "Preview" check keeps working exactly as before (#256). A
#     commit status is the only mechanism GitHub honors for a custom link target
#     (a github-actions[bot] Check Run has its details_url overridden).
#
# NATIVE-CHANGE GUARD: a JS OTA preview does NOT reflect native changes (native
# deps in package.json, app.config.js plugins, android/ ios/ dirs). We detect
# those in the push diff and WARN loudly in the summary that a fresh APK is
# needed — but still publish the JS update (never silently mislead).
#
# CONCURRENCY: keyed on the branch ref so rapid pushes cancel the in-flight
# superseded run (one live preview per branch) on PR branches only.
# EXCEPTION (#437): main is NEVER cancelled. Rapid merges to main used to cancel
# the in-flight preview for earlier main commits, leaving main commits (incl. the
# tip) with NO published preview at all. For main every push must publish its
# exact sha, so cancel-in-progress is forced false there; PR branches keep the
# "latest commit wins" cancellation.
#
# USAGE TRADEOFF: every push now builds + publishes, which increases Actions +
# EAS usage. The concurrency-cancel above mitigates rapid-push bursts. Branches
# that change native code still need an APK (see native guard).
#
# REQUIRES (native, one-time): the dev-client APK must include `expo-updates`.
# Until that APK is installed, the deep link has no updates client to load it.

on:
  push:
    branches: ['**']
  # GitHub fires `delete` when a branch or tag is deleted. We use it to tear down
  # that branch's per-branch EAS preview so stale channels/branches don't pile up.
  delete:

concurrency:
  # One preview build per branch at a time; a newer push cancels the in-flight
  # superseded run. Keyed on the ref so different branches never cancel each
  # other.
  group: app-preview-${{ github.ref }}
  # Cancel superseded runs on PR branches (latest commit wins), but NEVER on main
  # (#437): every push to main must publish a preview for its exact sha.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    # Only publish on push. The `delete` event handled below must not build.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      # Kill Expo/EAS telemetry network round-trips (saves a few seconds + avoids
      # flakey analytics calls).
      EXPO_NO_TELEMETRY: '1'
      TMPDIR: ${{ github.workspace }}/.metro-tmp
    steps:
      - uses: actions/checkout@v6
        with:
          # Need at least the previous commit so we can diff for native changes.
          fetch-depth: 2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      # TMPDIR is repointed at a workspace path (so the Metro cache survives via
      # actions/cache); create it up front so every tool that calls mkdtemp has a
      # real dir from the first step on.
      - name: Prepare temp dir
        run: mkdir -p "$TMPDIR"

      # Detect native changes in this push. A JS OTA preview can't reflect them,
      # so we set an output the publish + summary steps use to WARN (we still
      # publish the JS update). Tolerates the first push to a branch (no parent).
      - name: Detect native changes
        id: native
        run: |
          set -euo pipefail
          BEFORE='${{ github.event.before }}'
          # All-zeros = branch creation / no parent -> compare against the parent
          # of HEAD if present, else treat as no detectable native diff.
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              RANGE="HEAD~1 HEAD"
            else
              RANGE=""
            fi
          else
            RANGE="$BEFORE ${{ github.sha }}"
          fi
          NATIVE=false
          if [ -n "$RANGE" ]; then
            CHANGED="$(git diff --name-only $RANGE || true)"
            if echo "$CHANGED" | grep -Eq '^(android/|ios/|apps/app/app\.config\.js$|apps/app/package\.json$|package\.json$)'; then
              NATIVE=true
            fi
          fi
          echo "native=$NATIVE" >> "$GITHUB_OUTPUT"

      # Warm the bun install: the global module cache (~/.bun/install/cache) AND
      # the materialised node_modules trees (root + every workspace). bun.lock is
      # the exact-dependency key, so a hit means `bun install --frozen-lockfile`
      # below is a near-instant verify instead of a cold multi-minute download +
      # link of the RN / Expo / Railgun dependency graph. restore-keys lets a
      # stale-but-close cache still seed most packages when the lock changes.
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: bun-deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-deps-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      # NOTE (#437): we deliberately do NOT persist/restore the Metro transform
      # cache across runs. A stable cross-commit cache key once carried a
      # truncated/corrupt cache entry forward: it was emitted into the bundle as a
      # malformed JS array literal, which Hermes then failed to compile on-device
      # ("']' expected at end of array literal") = red-box crash on launch. The
      # source was fine; the persisted cache was poisoned and the stable key made
      # it sticky across every later commit. Correctness > the marginal export
      # speed-up: each run cold-bundles into the ephemeral TMPDIR, so a poisoned
      # entry can never survive a run or ship to a device.

      - name: Publish EAS Update for this branch
        id: update
        working-directory: apps/app
        # Stamp the preview bundle with the pushed commit so the About page shows
        # the exact previewed SHA. app.config.js (resolveGitHash) reads GIT_COMMIT.
        env:
          GIT_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p "$TMPDIR"
          # EAS channel/branch names allow [a-zA-Z0-9._-]; git refs can contain
          # '/' (e.g. feat/foo). Sanitise to a safe, stable per-branch channel.
          RAW_BRANCH='${{ github.ref_name }}'
          BRANCH="$(echo "$RAW_BRANCH" | tr '/' '-' | tr -cd 'a-zA-Z0-9._-')"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          # Git short-hash: the unambiguous identity of the previewed commit. We
          # keep a per-BRANCH EAS channel (the update groupId already makes each
          # publish a unique, immutable deep link, so the manifest URL maps 1:1 to
          # a commit) and surface the short-sha prominently in the update message,
          # job summary and Preview status so the running version is never in
          # doubt. A per-commit channel was rejected: it would create an unbounded
          # set of stale, never-cleaned channels (one per push, forever).
          SHORT_SHA="$(git rev-parse --short HEAD)"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          # Two-step export instead of letting `eas update` bundle implicitly, so
          # we can pass preview-only Metro flags that `eas update` does NOT expose:
          #
          #   1. `expo export` builds dist/ with:
          #      --platform android  : the preview is consumed ONLY by the Android
          #                            dev-client APK, so bundling iOS (and the web
          #                            byproduct) is pure waste. (eas update defaults
          #                            to --platform all = 2-3x the bundle work.)
          #      --no-minify         : a dev-client preview swaps in this JS at
          #                            runtime; it does not ship to users, so the
          #                            terser/minify pass is wasted CPU. Skipping it
          #                            cuts the export and leaves a larger-but-fine
          #                            bundle that downloads over the same manifest.
          #      --no-bytecode       : skip Hermes bytecode compilation (hermesc over
          #                            the whole bundle). The dev-client loads plain
          #                            JS for OTA updates; bytecode is a build-time
          #                            cost with no preview benefit.
          #      (source maps are OFF by default — we never pass -s — so no extra
          #       sourcemap emit/upload either.)
          #
          #   2. `eas update --skip-bundler --input-dir dist` uploads the dist/ we
          #      just built and auto-generates the expo-updates manifest the
          #      dev-client consumes, WITHOUT re-bundling. --non-interactive needs
          #      EXPO_TOKEN (set above). eas-cli is pinned (not @latest) so bunx
          #      resolves one cached version instead of re-checking the registry.
          #
          # The deep link rides the shared update groupId, unchanged by these flags,
          # so the launcher still resolves (eas-deeplink.mjs).
          bunx expo export \
            --platform android \
            --no-minify \
            --no-bytecode \
            --output-dir dist
          # Sanity-check the exported bundle is non-truncated before publishing
          # (#437): a poisoned/truncated bundle previously shipped a malformed JS
          # array literal that crashed Hermes on-device. node --check parse-checks
          # the bundle; a truncated file fails here and the run stops BEFORE the
          # broken update is published.
          BUNDLE="$(find dist -name '*.hbc' -o -name '*.js' | grep -E '/(_expo/static/js/android|bundles)/' | head -n1)"
          if [ -z "$BUNDLE" ]; then
            echo "::error::expo export produced no Android JS bundle" && exit 1
          fi
          node --check "$BUNDLE"
          bunx eas-cli@20.1.0 update \
            --branch "$BRANCH" \
            --platform android \
            --skip-bundler \
            --input-dir dist \
            --message "${RAW_BRANCH}@${SHORT_SHA} (${{ github.sha }})" \
            --non-interactive --json > eas-update.json
          node ../../scripts/pr-preview/eas-deeplink.mjs eas-update.json >> "$GITHUB_OUTPUT"

      - name: Write preview deep link to job summary
        run: |
          set -euo pipefail
          MANIFEST='${{ steps.update.outputs.manifest }}'
          DEEPLINK='${{ steps.update.outputs.deeplink }}'
          BRANCH='${{ steps.update.outputs.branch }}'
          SHORT_SHA='${{ steps.update.outputs.short_sha }}'
          LAUNCHER="https://metro.box/preview-launcher.html?u=$(node -e "process.stdout.write(encodeURIComponent(process.argv[1]))" "$MANIFEST")"
          QR="https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=$(node -e "process.stdout.write(encodeURIComponent(process.argv[1]))" "$DEEPLINK")"
          {
            echo "## App preview - \`${{ github.ref_name }}\` @ \`$SHORT_SHA\`"
            echo ""
            echo "**commit \`$SHORT_SHA\`** (\`${{ github.sha }}\`)"
            echo ""
            if [ '${{ steps.native.outputs.native }}' = 'true' ]; then
              echo "> [!WARNING]"
              echo "> This push changed NATIVE code (android/ ios/, app.config.js, or package.json)."
              echo "> A JS OTA preview will NOT reflect native changes — a fresh dev-client APK is needed."
              echo "> The JS update below is still published (it just won't include the native delta)."
              echo ""
            fi
            echo "**Channel:** \`$BRANCH\` &nbsp;·&nbsp; **commit:** \`$SHORT_SHA\`"
            echo ""
            echo "[Open dev-client preview ($SHORT_SHA)]($LAUNCHER)"
            echo ""
            echo "Raw deep link (tap on device) - commit \`$SHORT_SHA\`:"
            echo ""
            echo "\`$DEEPLINK\`"
            echo ""
            echo "![QR]($QR)"
          } >> "$GITHUB_STEP_SUMMARY"

      # When a PR exists for this branch, the clickable "Preview" commit status on
      # the head SHA satisfies the existing PR check (#256). On a plain push with
      # no PR this is harmless (the summary already carries the link). A commit
      # status is the only mechanism GitHub honors for a custom link target.
      - name: Publish clickable "Preview" status
        uses: actions/github-script@v7
        with:
          script: |
            const manifest = `${{ steps.update.outputs.manifest }}`;
            const target =
              'https://metro.box/preview-launcher.html?u=' + encodeURIComponent(manifest);
            const native = `${{ steps.native.outputs.native }}` === 'true';
            const shortSha = `${{ steps.update.outputs.short_sha }}`;
            const description = native
              ? `Open preview commit ${shortSha} (native changed - APK needed)`
              : `Open dev-client preview commit ${shortSha}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'Preview',
              target_url: target,
              description,
            });

  # When a git branch is deleted, tear down its per-branch EAS preview so stale
  # channels/branches don't accumulate forever. Gated on the `delete` event and
  # ref_type == 'branch' (a tag delete fires the same event and must be ignored).
  cleanup:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_NO_TELEMETRY: '1'
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Delete this branch's EAS preview channel + branch
        working-directory: apps/app
        run: |
          set -euo pipefail
          # Sanitise the deleted ref the SAME way the publish job does
          # (github.event.ref is the deleted branch name on a delete event), so we
          # target the exact channel/branch that was created on push.
          RAW_BRANCH='${{ github.event.ref }}'
          BRANCH="$(echo "$RAW_BRANCH" | tr '/' '-' | tr -cd 'a-zA-Z0-9._-')"
          echo "Tearing down EAS preview for branch '$RAW_BRANCH' -> '$BRANCH'"
          # Idempotent: a branch that never got a preview has no EAS channel/branch.
          # `|| true` so a missing channel/branch (or a tag-like ref) never fails
          # the job. --non-interactive needs EXPO_TOKEN (set above).
          #
          # Delete the channel first (it points at the branch), then the branch.
          bunx eas-cli@20.1.0 channel:delete "$BRANCH" --non-interactive || \
            echo "No EAS channel '$BRANCH' to delete (or already gone)."
          bunx eas-cli@20.1.0 branch:delete "$BRANCH" --non-interactive || \
            echo "No EAS branch '$BRANCH' to delete (or already gone)."
