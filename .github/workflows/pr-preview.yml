name: PR JS-bundle preview

# Per-PR JS-bundle preview for the Metro dev-client (#236).
#
# What it does: publishes the app's JS bundle as an EAS Update on a per-PR branch
# and posts a clickable "Preview" commit status on the PR. The status's "Details"
# link opens an https launcher page (metro.box/preview-launcher.html — a tracked
# static file in apps/ui/public, deployed durably via Netlify) that
# builds the dev-client deep link + QR. Less taps Details on a device that has the
# dev-client APK; the installed app swaps its JS for that PR's bundle — no new APK
# per PR. No PR comment (keeps the PR feed clean).
#
# TRIGGER: fully automatic — deploys on every PR open/reopen and re-deploys on
# every new commit pushed to the PR branch (synchronize). No comment, no label.
#
# NOTE: this ships JS ONLY. A PR that changes native code (new native modules,
# app.config native keys, android/ios dirs) needs a fresh APK — see the comment
# footer. We do NOT gate/skip on native changes; the preview always deploys.
#
# SAFETY:
#   • concurrency cancels in-flight runs on rapid pushes (one preview per PR).
#   • fork PRs are skipped — they have no access to EXPO_TOKEN, so the publish
#     would hard-fail; the job guard short-circuits before any work.
#
# REQUIRES (native, one-time): the dev-client APK must include `expo-updates`.
# Until that APK is installed, the deep link has no updates client to load it.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  # One preview build per PR at a time; newer trigger cancels the in-flight one.
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    # Forks can't read EXPO_TOKEN → skip rather than hard-fail.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      PR: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - run: bun install --frozen-lockfile

      - name: Publish EAS Update for this PR
        id: update
        working-directory: apps/app
        run: |
          set -euo pipefail
          BRANCH="pr-${PR}"
          # `eas update` runs `expo export` under the hood and uploads the same
          # JS bundle + assets, auto-generating the expo-updates manifest the
          # dev-client consumes. --non-interactive needs EXPO_TOKEN (set above).
          bunx eas-cli@latest update \
            --branch "$BRANCH" \
            --message "PR #${PR} @ ${{ github.event.pull_request.head.sha }}" \
            --non-interactive --json > eas-update.json
          node ../../scripts/pr-preview/eas-deeplink.mjs eas-update.json >> "$GITHUB_OUTPUT"

      - name: Post clickable Preview status on PR head
        uses: actions/github-script@v7
        with:
          script: |
            // The launcher page builds the dev-client deep link + QR from the EAS
            // update manifest URL passed as ?u=. A commit status with a target_url
            // renders as a clickable "Details" in the PR's checks section — no PR
            // comment, keeps the feed clean.
            const manifest = `${{ steps.update.outputs.manifest }}`;
            const target =
              'https://metro.box/preview-launcher.html?u=' + encodeURIComponent(manifest);
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              context: 'Preview',
              target_url: target,
              description: 'Open dev-client preview',
            });
