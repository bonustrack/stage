name: App preview

# Per-PR JS-bundle preview for the Metro dev-client (#236, #256).
#
# What it does: publishes the app's JS bundle as an EAS Update on a per-PR branch
# and surfaces a clickable "Preview" row on the PR whose Details opens an https
# launcher page (metro.box/preview-launcher.html — a tracked static file in
# apps/ui/public, deployed durably via Netlify) that builds the dev-client deep
# link + QR. Less taps it on a device that has the dev-client APK; the installed
# app swaps its JS for that PR's bundle — no new APK per PR. No PR comment.
#
# CHECKS RENDERING (#256) — what GitHub actually allows:
#   • A GitHub Actions job ALWAYS emits its own check whose Details points at the
#     Actions run; that target can't be customised.
#   • Only a commit status (target_url) or a Check Run (details_url) can carry a
#     custom link. BUT a Check Run created by the github-actions[bot] app has its
#     details_url OVERRIDDEN to the internal /runs/<id> page — verified empirically
#     on a throwaway PR — so it can't link straight to the launcher.
#   • Therefore the clickable "Preview" row is a COMMIT STATUS (target_url is
#     honored → Details opens the launcher directly). There's no way to render
#     literally one row: the Actions job check always exists too. We minimise it
#     by naming the workflow just "App preview" and the job "build", so its row
#     reads "App preview / build" → run logs (useful when a preview fails), while
#     "Preview" is the clean clickable one. (b) name is now simply "App preview".
#
# TRIGGER: fully automatic — deploys on every PR open/reopen and re-deploys on
# every new commit pushed to the PR branch (synchronize). No comment, no label.
#
# NOTE: this ships JS ONLY. A PR that changes native code (new native modules,
# app.config native keys, android/ios dirs) needs a fresh APK. We do NOT
# gate/skip on native changes; the preview always deploys.
#
# SAFETY:
#   • concurrency cancels in-flight runs on rapid pushes (one preview per PR).
#   • fork PRs are skipped — they have no access to EXPO_TOKEN, so the publish
#     would hard-fail; the job guard short-circuits before any work.
#
# REQUIRES (native, one-time): the dev-client APK must include `expo-updates`.
# Until that APK is installed, the deep link has no updates client to load it.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  # One preview build per PR at a time; newer trigger cancels the in-flight one.
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    # Forks can't read EXPO_TOKEN → skip rather than hard-fail.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      PR: ${{ github.event.pull_request.number }}
      # Kill Expo/EAS telemetry network round-trips (saves a few seconds + avoids
      # flakey analytics calls). Pin the Metro transform cache to a workspace path
      # (default is $TMPDIR/metro-cache, an ephemeral runner temp dir that never
      # survives a run) so actions/cache below can persist + restore it.
      EXPO_NO_TELEMETRY: '1'
      TMPDIR: ${{ github.workspace }}/.metro-tmp
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      # TMPDIR is repointed at a workspace path (so the Metro cache survives via
      # actions/cache); create it up front so every tool that calls mkdtemp has a
      # real dir from the first step on.
      - name: Prepare temp dir
        run: mkdir -p "$TMPDIR"

      # Warm the bun install: the global module cache (~/.bun/install/cache) AND
      # the materialised node_modules trees (root + every workspace). bun.lock is
      # the exact-dependency key, so a hit means `bun install --frozen-lockfile`
      # below is a near-instant verify instead of a cold multi-minute download +
      # link of the RN / Expo / Railgun dependency graph. restore-keys lets a
      # stale-but-close cache still seed most packages when the lock changes.
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: bun-deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-deps-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      # Warm the Metro transform cache. Cold-bundling ~7500 modules is the bulk of
      # the export time (the Android bundle alone was ~91s); restoring this dir
      # lets `expo export` reuse already-transformed modules across PR runs, so
      # only the files that actually changed get re-transformed.
      #
      # STABLE KEY (the whole point): the key is the lockfile hash PLUS a constant
      # epoch only — it deliberately does NOT embed a source-file hash. The old
      # source-hashed key changed on every PR (different diff = different hash), so
      # actions/cache never found an exact match and every run was a cold cache
      # MISS that re-transformed all ~7500 modules. With a stable key the dir is
      # reused run-to-run; Metro's own per-file content hashing inside the cache
      # then re-transforms only the handful of files that changed. Bump the epoch
      # to force a clean rebuild if the cache ever goes bad. restore-keys gives a
      # lockfile-independent fallback so even a dep bump still seeds most modules.
      - name: Cache Metro transform cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.metro-tmp/metro-cache
          key: metro-cache-v1-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            metro-cache-v1-${{ runner.os }}-

      - name: Publish EAS Update for this PR
        id: update
        working-directory: apps/app
        run: |
          set -euo pipefail
          mkdir -p "$TMPDIR"
          BRANCH="pr-${PR}"
          # Two-step export instead of letting `eas update` bundle implicitly, so
          # we can pass preview-only Metro flags that `eas update` does NOT expose:
          #
          #   1. `expo export` builds dist/ with:
          #      --platform android  : the preview is consumed ONLY by the Android
          #                            dev-client APK, so bundling iOS (and the web
          #                            byproduct) is pure waste. (eas update defaults
          #                            to --platform all = 2-3x the bundle work.)
          #      --no-minify         : a dev-client preview swaps in this JS at
          #                            runtime; it does not ship to users, so the
          #                            terser/minify pass is wasted CPU. Skipping it
          #                            cuts the export and leaves a larger-but-fine
          #                            bundle that downloads over the same manifest.
          #      --no-bytecode       : skip Hermes bytecode compilation (hermesc over
          #                            the whole bundle). The dev-client loads plain
          #                            JS for OTA updates; bytecode is a build-time
          #                            cost with no preview benefit.
          #      (source maps are OFF by default — we never pass -s — so no extra
          #       sourcemap emit/upload either.)
          #
          #   2. `eas update --skip-bundler --input-dir dist` uploads the dist/ we
          #      just built and auto-generates the expo-updates manifest the
          #      dev-client consumes, WITHOUT re-bundling. --non-interactive needs
          #      EXPO_TOKEN (set above). eas-cli is pinned (not @latest) so bunx
          #      resolves one cached version instead of re-checking the registry.
          #
          # The deep link rides the shared update groupId, unchanged by these flags,
          # so the launcher still resolves (eas-deeplink.mjs).
          bunx expo export \
            --platform android \
            --no-minify \
            --no-bytecode \
            --output-dir dist
          bunx eas-cli@20.1.0 update \
            --branch "$BRANCH" \
            --platform android \
            --skip-bundler \
            --input-dir dist \
            --message "PR #${PR} @ ${{ github.event.pull_request.head.sha }}" \
            --non-interactive --json > eas-update.json
          node ../../scripts/pr-preview/eas-deeplink.mjs eas-update.json >> "$GITHUB_OUTPUT"

      - name: Publish clickable "Preview" status on PR head
        uses: actions/github-script@v7
        with:
          script: |
            // The launcher page builds the dev-client deep link + QR from the EAS
            // update manifest URL passed as ?u=. A commit status with a target_url
            // renders as a clickable "Preview" row whose Details opens the launcher
            // DIRECTLY — verified the only mechanism GitHub honors for a custom
            // link target (#256): a Check Run created by the github-actions[bot]
            // app has its details_url overridden to the internal /runs/<id> page,
            // so it can't link straight to the launcher; a commit status can.
            const manifest = `${{ steps.update.outputs.manifest }}`;
            const target =
              'https://metro.box/preview-launcher.html?u=' + encodeURIComponent(manifest);
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              context: 'Preview',
              target_url: target,
              description: 'Open dev-client preview',
            });
