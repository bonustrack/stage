name: PR JS-bundle preview

# Per-PR JS-bundle preview for the Metro dev-client (#236).
#
# What it does: publishes the app's JS bundle as an EAS Update on a per-PR branch
# and comments a tap-to-load dev-client deep link + QR on the PR. Less taps the
# link on a device that has the dev-client APK; the installed app swaps its JS for
# that PR's bundle — no new APK per PR.
#
# TRIGGER: fully automatic — deploys on every PR open/reopen and re-deploys on
# every new commit pushed to the PR branch (synchronize). No comment, no label.
#
# NOTE: this ships JS ONLY. A PR that changes native code (new native modules,
# app.config native keys, android/ios dirs) needs a fresh APK — see the comment
# footer. We do NOT gate/skip on native changes; the preview always deploys.
#
# SAFETY:
#   • concurrency cancels in-flight runs on rapid pushes (one preview per PR).
#   • fork PRs are skipped — they have no access to EXPO_TOKEN, so the publish
#     would hard-fail; the job guard short-circuits before any work.
#
# REQUIRES (native, one-time): the dev-client APK must include `expo-updates`.
# Until that APK is installed, the deep link has no updates client to load it.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  # One preview build per PR at a time; newer trigger cancels the in-flight one.
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    # Forks can't read EXPO_TOKEN → skip rather than hard-fail.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      PR: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - run: bun install --frozen-lockfile

      - name: Publish EAS Update for this PR
        id: update
        working-directory: apps/app
        run: |
          set -euo pipefail
          BRANCH="pr-${PR}"
          # `eas update` runs `expo export` under the hood and uploads the same
          # JS bundle + assets, auto-generating the expo-updates manifest the
          # dev-client consumes. --non-interactive needs EXPO_TOKEN (set above).
          bunx eas-cli@latest update \
            --branch "$BRANCH" \
            --message "PR #${PR} @ ${{ github.event.pull_request.head.sha }}" \
            --non-interactive --json > eas-update.json
          node ../../scripts/pr-preview/eas-deeplink.mjs eas-update.json >> "$GITHUB_OUTPUT"

      - name: Generate QR
        id: qr
        run: |
          # QR encodes the dev-client deep link; rendered inline in the comment.
          LINK='${{ steps.update.outputs.deeplink }}'
          echo "img=https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=$(node -e "console.log(encodeURIComponent(process.argv[1]))" "$LINK")" >> "$GITHUB_OUTPUT"

      - name: Comment preview link on PR
        uses: actions/github-script@v7
        with:
          script: |
            const link = `${{ steps.update.outputs.deeplink }}`;
            const qr = `${{ steps.qr.outputs.img }}`;
            const body = [
              '### 📱 PR JS-bundle preview',
              '',
              `Tap on a device that has the **Metro dev-client** installed to load this PR's JS bundle:`,
              '',
              `**[Open in Metro dev-client](${link})**`,
              '',
              `\`${link}\``,
              '',
              `<img src="${qr}" width="200" alt="QR to load preview" />`,
              '',
              `<sub>JS bundle only (EAS Update branch \`pr-${process.env.PR}\`). Needs the expo-updates-enabled dev-client APK. Auto-redeploys on every push. PRs that change native code need a fresh APK.</sub>`,
            ].join('\n');
            // Upsert: replace our previous preview comment instead of stacking.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: Number(process.env.PR),
            });
            const mine = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('PR JS-bundle preview'));
            if (mine) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: mine.id, body });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: Number(process.env.PR), body });
            }
