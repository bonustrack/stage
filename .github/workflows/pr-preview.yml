name: App preview (manual fallback)

# Per-PR JS-bundle preview for the Metro dev-client (#236, #256).
#
# ⚠️ NO LONGER THE PRIMARY PATH (#256). The single-row preview now runs on the
# metro DAEMON (scripts/pr-preview/daemon-watcher.mjs), triggered by the existing
# GitHub webhook — exactly like Netlify, which builds off-Actions and reports a
# single GitHub check. Running the build as a GitHub Actions workflow ALWAYS adds
# a second, uncustomisable Actions-job check row to the PR; moving it onto the
# daemon eliminates that row, leaving only the clean clickable "Preview" commit
# status. See scripts/pr-preview/daemon-watcher.mjs for the design + run docs.
#
# This workflow is KEPT as a MANUAL fallback only (workflow_dispatch): if the
# daemon is down, you can publish a PR's preview by dispatching this with the PR
# number. It no longer runs automatically on pull_request events, so it adds NO
# extra check row to PRs in normal operation.
#
# What it does: publishes the app's JS bundle as an EAS Update on branch pr-<n>
# and POSTs a clickable "Preview" COMMIT STATUS whose Details opens the https
# launcher (metro.box/preview-launcher.html?u=<manifest>) — same contract the
# daemon watcher uses, so manual + automatic produce identical results.
#
# NOTE: JS ONLY. Native changes still need a fresh APK. Requires (native,
# one-time): the dev-client APK must include `expo-updates`.

on:
  workflow_dispatch:
    inputs:
      pr:
        description: PR number to publish a preview for
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      PR: ${{ github.event.inputs.pr }}
    steps:
      - name: Resolve PR head sha
        id: head
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: Number(process.env.PR),
            });
            core.setOutput('sha', pr.head.sha);

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.head.outputs.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - run: bun install --frozen-lockfile

      - name: Publish EAS Update for this PR
        id: update
        working-directory: apps/app
        run: |
          set -euo pipefail
          BRANCH="pr-${PR}"
          # `eas update` runs `expo export` under the hood and uploads the same
          # JS bundle + assets, auto-generating the expo-updates manifest the
          # dev-client consumes. --non-interactive needs EXPO_TOKEN (set above).
          bunx eas-cli@latest update \
            --branch "$BRANCH" \
            --message "PR #${PR} @ ${{ steps.head.outputs.sha }}" \
            --non-interactive --json > eas-update.json
          node ../../scripts/pr-preview/eas-deeplink.mjs eas-update.json >> "$GITHUB_OUTPUT"

      - name: Publish clickable "Preview" status on PR head
        uses: actions/github-script@v7
        with:
          script: |
            // The launcher page builds the dev-client deep link + QR from the EAS
            // update manifest URL passed as ?u=. A commit status with a target_url
            // renders as a clickable "Preview" row whose Details opens the launcher
            // DIRECTLY — verified the only mechanism GitHub honors for a custom
            // link target (#256): a Check Run created by the github-actions[bot]
            // app has its details_url overridden to the internal /runs/<id> page,
            // so it can't link straight to the launcher; a commit status can.
            const manifest = `${{ steps.update.outputs.manifest }}`;
            const target =
              'https://metro.box/preview-launcher.html?u=' + encodeURIComponent(manifest);
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: `${{ steps.head.outputs.sha }}`,
              state: 'success',
              context: 'Preview',
              target_url: target,
              description: 'Open dev-client preview',
            });
