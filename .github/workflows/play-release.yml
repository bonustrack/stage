name: Play production release

# FULLY-AUTOMATED Google Play release for the Stage app (applicationId box.stage).
#
# WHY SELF-HOSTED:
#   EAS CLOUD builds of the `production` profile are BROKEN (the Railgun /
#   nodejs-mobile bundle-JS phase fails in the EAS cloud builder), so the signed
#   AAB MUST be built LOCALLY on a Mac with the full native toolchain. GitHub's
#   hosted runners cannot do that, so this workflow targets a SELF-HOSTED runner
#   registered on Less's Mac (see docs/play-release.md for the one-time setup).
#
#   The actual work is delegated to scripts/release-production.sh — the same
#   script you can run by hand on the Mac with zero Actions dependency. This
#   workflow is just a triggerable, secret-injecting wrapper around it.
#
# TRIGGERS:
#   - workflow_dispatch: manual, with a `track` input (default: production).
#   - push tags v*: tagging a release (e.g. `git tag v0.2.0 && git push --tags`)
#     ships to the production track automatically.
#
# SECRETS REQUIRED (repo Settings -> Secrets -> Actions):
#   - PLAY_SERVICE_ACCOUNT_JSON : full JSON of a Google Play service account
#       granted "Release to production / testing tracks".
#   - EXPO_TOKEN                : EAS access token (already in the repo).

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play track to release to'
        type: choice
        required: true
        default: production
        options:
          - production
          - internal
          - alpha
          - beta
  push:
    tags:
      - 'v*'

# Never let two releases submit overlapping builds to the same app. Queue them.
concurrency:
  group: play-release
  cancel-in-progress: false

jobs:
  release:
    # Registered on Less's Mac (one-time `./config.sh` + `./run.sh`). Uses the
    # build host's toolchain — node 18, JDK 17, Android SDK.
    runs-on: self-hosted
    timeout-minutes: 90
    env:
      APP_VARIANT: prod
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      # Tag pushes always go to production; manual runs use the chosen track.
      TRACK: ${{ github.event_name == 'push' && 'production' || inputs.track }}
    steps:
      - uses: actions/checkout@v6

      - name: Guard — require Play service-account secret
        env:
          SA_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "${SA_JSON:-}" ]; then
            echo "::error::PLAY_SERVICE_ACCOUNT_JSON secret is not set."
            echo "::error::Add it in repo Settings -> Secrets -> Actions (see docs/play-release.md)."
            exit 1
          fi
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "::error::EXPO_TOKEN secret is not set."
            exit 1
          fi

      - name: Build + submit (local AAB -> Play)
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          chmod +x scripts/release-production.sh
          ./scripts/release-production.sh "$TRACK"

      - name: Summary
        if: always()
        run: |
          {
            echo "### Play production release"
            echo ""
            echo "- Track: \`$TRACK\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Ref: \`${{ github.ref_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
